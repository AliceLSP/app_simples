services:
  db:
    image: postgres:15-alpine
    container_name: alice_db
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - alice_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: alice_api
    restart: always  # <-- Se a API cair, o Docker sobe ela de novo até o banco estar pronto.
    environment:
      DB_HOST: db
    depends_on:
      - db
    ports:
      - "3010:3000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/tarefas || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  

    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Cada arquivo de log terá no máximo 10MB
        max-file: "3"     # O Docker guarda apenas os últimos 3 arquivos (total 30MB)  

  web:
    build: ./frontend
    container_name: alice_web
    ports:
      - "8010:80"
    depends_on:
      - api

volumes:
  alice_data: